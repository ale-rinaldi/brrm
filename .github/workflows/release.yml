name: Release APT repo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Una deploy alla volta su Pages; se ne parte un'altra mentre questa è in volo,
# aspetta che finisca (non cancella per non perdere release).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # serve a git rev-parse

      - name: Calcola version suffix (YYYYMMDDHHMM.shortsha)
        run: |
          # YYYYMMDDHHMM e' strettamente crescente -> dpkg confronta la parte
          # numerica e riconosce sempre la release piu' recente come piu' nuova,
          # anche con piu' commit nello stesso giorno (il solo SHA non e'
          # ordinabile lessicograficamente in modo affidabile).
          SUFFIX="$(date -u +%Y%m%d%H%M).$(git rev-parse --short HEAD)"
          echo "VERSION_SUFFIX=$SUFFIX" >> "$GITHUB_ENV"
          echo "Suffix per questa release: $SUFFIX"

      # Ubuntu runner ha Gambas 3.18 (solo gb.qt5). Servono 3.20+ con gb.qt6,
      # quindi il build avviene dentro un container Debian trixie.
      - name: Build dei .deb (container Debian trixie)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e VERSION_SUFFIX \
            debian:trixie \
            bash -c "set -e
              apt-get update -qq
              apt-get install -y -qq \
                gambas3-devel \
                gambas3-runtime \
                gambas3-gb-qt6 \
                gambas3-gb-form \
                gambas3-gb-net \
                gambas3-gb-net-curl \
                gambas3-gb-util-web \
                fakeroot
              ./package.sh"

      - name: Installa tool per metadata APT e firma
        run: sudo apt-get update -qq && sudo apt-get install -y -qq apt-utils dpkg-dev gnupg

      - name: Importa chiave GPG di signing
        run: |
          echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')
          echo "GPG_KEYID=$KEYID" >> "$GITHUB_ENV"
          echo "Importata chiave: $KEYID"

      - name: Costruisci metadata APT e firma Release
        run: |
          mkdir -p apt-repo
          cp dist/*.deb apt-repo/
          cd apt-repo
          # Indice dei pacchetti
          dpkg-scanpackages --multiversion . > Packages
          gzip -9 -k -f Packages
          # Release (metadata top-level del repo flat)
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="ale-rinaldi/brrm" \
            -o APT::FTPArchive::Release::Label="brrm" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="brrm" \
            -o APT::FTPArchive::Release::Architectures="all" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="brrm APT repository" \
            release . > Release
          # Firma: Release.gpg (detached) + InRelease (clearsigned)
          gpg --batch --yes --armor --detach-sign \
              --default-key "$GPG_KEYID" \
              --output Release.gpg Release
          gpg --batch --yes --clearsign \
              --default-key "$GPG_KEYID" \
              --output InRelease Release
          # Esporta chiave pubblica per gli utenti del repo
          gpg --armor --export "$GPG_KEYID" > brrm-apt-key.asc

      - name: Pagina indice landing
        run: |
          cat > apt-repo/index.html <<'EOF'
          <!doctype html>
          <html lang="it">
          <head>
            <meta charset="utf-8">
            <title>brrm - APT repository</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2em auto; padding: 0 1em; line-height: 1.5; }
              code, pre { background: #f4f4f4; padding: 0.2em 0.4em; border-radius: 3px; }
              pre { padding: 1em; overflow-x: auto; white-space: pre-wrap; }
              .warn { background: #fff3cd; border-left: 4px solid #ffc107; padding: 0.5em 1em; }
            </style>
          </head>
          <body>
            <h1>brrm - APT repository</h1>
            <p>Pacchetti Debian per <a href="https://github.com/ale-rinaldi/brrm">brrm</a> (BoxRally Race Manager), software amatoriale di cronometraggio per gare Soap Box.</p>
            <div class="warn">
              <strong>Software amatoriale.</strong> Nessuna pretesa di efficienza o correttezza. Usalo a tuo rischio.
            </div>
            <h2>Installazione</h2>
            <p>Su Debian/Ubuntu recenti (richiede Gambas 3 con Qt6 disponibile nei repo della distro &mdash; Debian 13 trixie o successive):</p>
            <pre>sudo install -d /etc/apt/keyrings
          curl -fsSL https://ale-rinaldi.github.io/brrm/brrm-apt-key.asc \
            | sudo gpg --dearmor -o /etc/apt/keyrings/brrm-apt.gpg
          echo "deb [signed-by=/etc/apt/keyrings/brrm-apt.gpg] https://ale-rinaldi.github.io/brrm ./" \
            | sudo tee /etc/apt/sources.list.d/brrm.list
          sudo apt update
          sudo apt install brrm brrm-partenza</pre>
            <h2>Pacchetti</h2>
            <ul>
              <li><code>brrm</code> &mdash; postazione arrivo (cronometraggio completo)</li>
              <li><code>brrm-partenza</code> &mdash; postazione partenza</li>
            </ul>
            <p>Versionamento: <code>&lt;ver-base&gt;+YYYYMMDDHHMM.&lt;short-sha&gt;</code> &mdash; ogni commit su <code>main</code> produce una nuova release.</p>
          </body>
          </html>
          EOF

      - name: Upload artefatto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apt-repo

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
